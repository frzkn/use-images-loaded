name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - node: 22
            react: 16.14.0
          - node: 24
            react: 16.14.0
          - node: 24
            react: 17.0.2
          - node: 24
            react: 18.3.1
          - node: 24
            react: 19.2.7
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn add --ignore-workspace-root-check --dev --exact react@${{ matrix.react }} react-dom@${{ matrix.react }}
      - run: yarn test
      - run: npm pack ./use-images-loaded --dry-run --ignore-scripts
